<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#131313">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="AutoDJ — Signal & Flow Now Playing">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>AutoDJ — Now Playing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Signal & Flow Design System — AutoDJ v6.0.0 ─────────────────────── */
:root {
  /* Primary palette */
  --signal: #ffb3ac;
  --signal-dim: rgba(255, 179, 172, 0.15);
  --signal-glow: rgba(255, 179, 172, 0.25);
  --flow: #a6e6ff;
  --flow-dim: rgba(166, 230, 255, 0.12);
  --flow-glow: rgba(166, 230, 255, 0.2);

  /* Background & surface */
  --bg: #131313;
  --bg-lowest: #0e0e0e;
  --surface-1: #1a1a1a;
  --surface-2: #242424;
  --surface-3: #2e2e2d;
  --surface-4: #353534;

  /* Borders */
  --border-dim: rgba(255, 255, 255, 0.06);
  --border: rgba(255, 255, 255, 0.10);
  --border-bright: rgba(255, 255, 255, 0.16);

  /* Text */
  --text-primary: #f0f0f0;
  --text-secondary: #b0b0b0;
  --text-muted: #787878;
  --text-dim: #555;

  /* Special */
  --green: #4ade80;
  --yellow: #facc15;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --transition: 250ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ─── Reset ────────────────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--text-primary); }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden; /* full-screen no scroll */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Scrollbar ────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* ─── Full-screen background with dot-grid texture ────────────────────── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: var(--bg);
}
.bg-layer::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}
.bg-orb {
  position: absolute; border-radius: 50%; filter: blur(140px);
  opacity: 0.06; animation: orbDrift 28s ease-in-out infinite alternate;
  pointer-events: none;
}
.orb-signal {
  width: 700px; height: 700px; background: var(--signal);
  top: -250px; right: -150px;
}
.orb-flow {
  width: 550px; height: 550px; background: var(--flow);
  bottom: -200px; left: -150px;
  animation-delay: -9s;
}
.orb-mid {
  width: 400px; height: 400px; background: linear-gradient(135deg, var(--signal), var(--flow));
  top: 45%; left: 35%;
  animation-delay: -16s;
}
@keyframes orbDrift {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, -30px) scale(1.08); }
}

/* ─── App shell ────────────────────────────────────────────────────────── */
.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  padding: 32px 48px 48px;
  overflow: hidden;
}
@media (max-width: 900px) {
  .app { padding: 20px 24px 40px; }
}

/* ─── Top bar ──────────────────────────────────────────────────────────── */
.top-bar {
  display: flex; justify-content: space-between; align-items: flex-start;
  flex-shrink: 0; padding-bottom: 16px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
}
.brand-logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 5px;
  text-transform: uppercase; color: var(--text-muted);
}
.live-indicator {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--signal); padding: 3px 8px;
  border: 1px solid var(--signal-dim); border-radius: 20px;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--signal); animation: pulse-dot 1.2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 0.35; transform: scale(0.85); }
  50%      { opacity: 1;    transform: scale(1.1);  }
}

.top-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
}
.clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 500;
  color: var(--text-primary); letter-spacing: 2px;
}
.clock-sub {
  font-family: 'Inter', sans-serif;
  font-size: 10px; color: var(--text-muted); letter-spacing: 1px;
}
#xfade-ind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--signal); display: none; margin-top: 2px;
}
#xfade-ind.visible { display: block; animation: pulse-dot 0.6s infinite; }

/* ─── Listener count badge ─────────────────────────────────────────────── */
.listener-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-muted); background: var(--surface-1);
  border: 1px solid var(--border-dim); border-radius: 20px;
  padding: 3px 10px 3px 8px; margin-top: 3px;
  transition: all var(--transition);
}
.listener-badge::before {
  content: ''; display: inline-block;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--flow); opacity: 0.7;
}
#listener-count { color: var(--text-secondary); }

/* ─── Main content area ────────────────────────────────────────────────── */
.main-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 40px; min-height: 0;
}
@media (max-width: 900px) {
  .main-area { flex-direction: column; gap: 24px; }
}

/* ─── Album art ────────────────────────────────────────────────────────── */
.art-section {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.album-art-wrap {
  position: relative;
  width: min(300px, 28vw, 40vh);
  aspect-ratio: 1; border-radius: var(--radius-lg);
  overflow: hidden;
}
.album-art-glow {
  position: absolute; inset: -40px; z-index: -1;
  border-radius: 50%; filter: blur(60px);
  background: var(--flow-glow);
  opacity: 0; transition: opacity 1.2s ease;
}
.album-art-glow.active { opacity: 0.6; }
#album-art {
  width: 100%; height: 100%; object-fit: cover;
  display: block; border-radius: var(--radius-lg);
  background: var(--surface-2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.art-placeholder {
  display: none; width: 100%; height: 100%;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--surface-2), var(--surface-4));
  align-items: center; justify-content: center;
  font-size: 48px; color: var(--text-dim);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.art-placeholder.visible { display: flex; }

/* ─── Track info ───────────────────────────────────────────────────────── */
.track-section {
  flex: 1; max-width: 560px;
  display: flex; flex-direction: column; justify-content: center;
}
.genre-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--flow); background: var(--flow-dim);
  border: 1px solid rgba(166, 230, 255, 0.25);
  padding: 3px 12px; border-radius: 20px;
  margin-bottom: 12px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 100%;
}
.np-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 6px;
}
#track-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(28px, 4vw, 56px); font-weight: 700;
  color: var(--text-primary); line-height: 1.05;
  margin-bottom: 6px; letter-spacing: -0.02em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
#track-artist {
  font-family: 'Inter', sans-serif;
  font-size: clamp(16px, 1.8vw, 26px); font-weight: 400;
  color: var(--signal); line-height: 1.2;
  margin-bottom: 4px; letter-spacing: 0.02em;
}
#track-album {
  font-family: 'Inter', sans-serif;
  font-size: clamp(12px, 1vw, 16px); font-weight: 300;
  color: var(--text-muted); font-style: italic;
  margin-bottom: 16px; letter-spacing: 0.01em;
}

/* ─── Progress bar ─────────────────────────────────────────────────────── */
.progress-area { width: 100%; margin-bottom: 8px; }
#progress-bar {
  width: 100%; height: 4px;
  background: var(--border); border-radius: 4px;
  overflow: hidden; position: relative; cursor: pointer;
}
.progress-fill {
  height: 100%; border-radius: 4px; width: 0%;
  background: linear-gradient(90deg, var(--signal), var(--flow));
  box-shadow: 0 0 12px var(--signal-glow);
  transition: width 0.4s linear;
  position: relative;
}
/* Small dot at end of progress */
.progress-fill::after {
  content: ''; position: absolute; right: -4px; top: -3px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--flow); opacity: 0.7;
  box-shadow: 0 0 14px var(--flow-glow);
}
.progress-times {
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-muted);
  margin-top: 5px; letter-spacing: 0.5px;
}
#progress-elapsed { color: var(--text-secondary); }
#progress-duration { color: var(--text-dim); }
.remaining {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--signal); letter-spacing: 0.5px;
}

/* ─── VU Meter animation ───────────────────────────────────────────────── */
.vu-section {
  margin-top: 16px; margin-bottom: 4px;
}
#vu-container {
  display: flex; align-items: flex-end; gap: 3px;
  height: 32px;
}
.vu-bar {
  flex: 1; min-width: 3px; max-width: 8px;
  border-radius: 2px 2px 0 0;
  background: linear-gradient(to top, var(--signal), var(--flow));
  height: 2px; min-height: 2px;
  transition: height 0.06s ease, opacity 0.12s ease;
  opacity: 0.3;
}
.vu-bar.playing { opacity: 0.7; }
.vu-bar:nth-child(3n+1) { background: linear-gradient(to top, var(--signal), #ff8a80); }
.vu-bar:nth-child(3n+2) { background: linear-gradient(to top, #ff8a80, var(--flow)); }
.vu-bar:nth-child(3n)   { background: linear-gradient(to top, #b088ff, var(--flow)); }

/* ─── UP NEXT queue ────────────────────────────────────────────────────── */
.nextup-section {
  margin-top: 16px; width: 100%;
}
.nextup-header {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.nextup-header::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, var(--border-dim), transparent);
}
.nextup-list {
  display: flex; flex-direction: column; gap: 6px;
}
.nextup-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: var(--surface-1);
  border: 1px solid var(--border-dim); border-radius: var(--radius-sm);
  transition: background var(--transition);
}
.nextup-item:hover { background: var(--surface-2); }
.nextup-item-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text-dim); min-width: 18px;
}
.nextup-item-info { flex: 1; overflow: hidden; }
#next-title {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#next-artist {
  font-family: 'Inter', sans-serif;
  font-size: 10px; color: var(--text-muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nextup-item-art {
  width: 28px; height: 28px; border-radius: 4px;
  object-fit: cover; flex-shrink: 0;
  background: var(--surface-3);
}

/* ─── RSS news marquee ─────────────────────────────────────────────────── */
.marquee-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(90deg, rgba(255,179,172,0.04), rgba(166,230,255,0.04));
  border-top: 1px solid var(--border-dim);
  padding: 9px 0; overflow: hidden; z-index: 10;
  height: 36px; backdrop-filter: blur(6px);
}
.marquee-track {
  display: flex; gap: 64px;
  animation: marqueeScroll 50s linear infinite;
  white-space: nowrap; will-change: transform;
}
.marquee-track:hover { animation-play-state: paused; }
@keyframes marqueeScroll {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-50%, 0, 0); }
}
#marquee-text {
  display: flex; gap: 64px; flex-shrink: 0;
}
.marquee-msg {
  font-family: 'Inter', sans-serif;
  font-size: 12px; color: var(--text-secondary); letter-spacing: 0.3px;
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
}
.marquee-msg::before {
  content: '◆'; color: var(--signal); font-size: 7px;
}

/* ─── Controls bar (audio toggle, theme, clear) ────────────────────────── */
.controls-bar {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px;
}
.ctrl-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  background: var(--surface-1); border: 1px solid var(--border-dim);
  color: var(--text-muted); padding: 4px 10px; border-radius: 14px;
  cursor: pointer; transition: all var(--transition);
}
.ctrl-btn:hover { border-color: var(--border-bright); color: var(--text-secondary); }
.ctrl-btn.primary {
  color: var(--signal); border-color: var(--signal-dim);
}
.ctrl-btn.primary:hover { border-color: var(--signal); background: var(--signal-dim); }
.ctrl-btn.playing {
  color: var(--green); border-color: rgba(74, 222, 128, 0.25);
}
.ctrl-btn.playing:hover { border-color: var(--green); }

/* ─── Deck cues panel ──────────────────────────────────────────────────── */
#deck-cues {
  display: none; margin-top: 14px;
  padding: 10px 14px;
  background: var(--surface-1); border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
}
#deck-cues.visible { display: block; }
.deck-cues-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 6px;
}
.deck-cue {
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: var(--surface-2);
}
.deck-cue-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 2px; margin-bottom: 4px;
}
.deck-cue-title {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.deck-cue-artist {
  font-family: 'Inter', sans-serif;
  font-size: 9px; color: var(--text-muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.deck-cue-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text-dim); margin-top: 4px;
}

/* ─── Lyrics panel ─────────────────────────────────────────────────────── */
#lyrics-panel {
  display: none; margin-top: 10px;
  padding: 8px 14px; background: var(--surface-1);
  border: 1px solid var(--border-dim); border-radius: var(--radius-sm);
  max-height: 200px; overflow-y: auto;
  text-align: center;
}
#lyrics-content { font-size: 12px; line-height: 1.7; color: var(--text-secondary); }
#lyrics-content .lrc-line {
  transition: color 0.25s, opacity 0.25s; opacity: 0.5;
}
#lyrics-content .lrc-line.active {
  color: var(--flow); opacity: 1;
  text-shadow: 0 0 12px rgba(166, 230, 255, 0.25);
}
#lyrics-source {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; color: var(--text-dim); margin-top: 4px;
  letter-spacing: 1px; text-transform: uppercase;
}

/* ─── Audio element (hidden) ───────────────────────────────────────────── */
#audio-main { display: none; }

/* ─── Responsive tweaks ────────────────────────────────────────────────── */
@media (max-width: 860px) {
  .main-area { flex-direction: column; gap: 20px; }
  .art-section { order: -1; }
  .album-art-wrap { width: min(160px, 40vw); }
  .track-section { max-width: 100%; text-align: center; }
  #track-title { font-size: clamp(20px, 5vw, 32px); white-space: normal; }
  #track-artist { font-size: clamp(14px, 2.8vw, 20px); }
  .top-bar { flex-direction: column; align-items: center; gap: 6px; }
  .top-right { align-items: center; }
  .controls-bar { justify-content: center; }
  .nextup-list { flex-direction: row; overflow-x: auto; gap: 6px; }
  .nextup-item { min-width: 160px; flex-shrink: 0; }
  .clock { font-size: 16px; }
  .vu-section { display: none; }
}

@media (max-width: 480px) {
  .app { padding: 14px 16px 40px; }
  .album-art-wrap { width: min(120px, 50vw); }
  #track-title { font-size: clamp(16px, 6vw, 24px); }
  #track-artist { font-size: clamp(12px, 3.5vw, 16px); }
  #track-album { font-size: 11px; }
  .top-bar { gap: 4px; }
  .nextup-item { min-width: 120px; padding: 5px 8px; }
  .nextup-item-art { width: 22px; height: 22px; }
  #next-title { font-size: 11px; }
  #next-artist { font-size: 9px; }
}
</style>
</head>
<body>

<!-- ─── Background ─────────────────────────────────────────────────────── -->
<div class="bg-layer">
  <div class="bg-orb orb-signal"></div>
  <div class="bg-orb orb-flow"></div>
  <div class="bg-orb orb-mid"></div>
</div>

<!-- ─── App shell ──────────────────────────────────────────────────────── -->
<div class="app">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="brand">
      <span class="brand-logo">AutoDJ</span>
      <span class="live-indicator">
        <span class="live-dot"></span> Live
      </span>
    </div>
    <div class="top-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="clock-sub" id="date-display"></div>
      <div id="xfade-ind">⟷ Crossfading</div>
      <div class="listener-badge">
        <span id="listener-count">0</span> listeners
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-area">

    <!-- Album art -->
    <div class="art-section">
      <div class="album-art-wrap">
        <div class="album-art-glow" id="album-art-glow"></div>
        <img id="album-art" alt="Album Art" style="display:none">
        <div class="art-placeholder" id="art-placeholder">♪</div>
      </div>
    </div>

    <!-- Track info + progress + VU + next up -->
    <div class="track-section">
      <div class="genre-tag" id="genre-display">— Waiting —</div>

      <div class="np-label">Now Playing</div>
      <div id="track-title">AutoDJ</div>
      <div id="track-artist">Starting up...</div>
      <div id="track-album"></div>

      <!-- Progress bar -->
      <div class="progress-area">
        <div id="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-times">
          <span id="progress-elapsed">0:00</span>
          <span class="remaining" id="np-remaining">—</span>
          <span id="progress-duration">0:00</span>
        </div>
      </div>

      <!-- VU Meter -->
      <div class="vu-section">
        <div id="vu-container">
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
          <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
        </div>
      </div>

      <!-- UP NEXT queue -->
      <div class="nextup-section">
        <div class="nextup-header">Up Next</div>
        <div class="nextup-list" id="nextup-list">
          <div class="nextup-item">
            <span class="nextup-item-num">01</span>
            <div class="nextup-item-info">
              <div id="next-title">—</div>
              <div id="next-artist">—</div>
            </div>

<!-- ─── Audio element (id="audio-main" for engine.js compatibility) ────── -->
<audio id="audio-main" preload="metadata" crossorigin="anonymous"></audio>

<script>
// ─── Theme ────────────────────────────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('autodj-theme');
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  const theme = saved || (prefersLight ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  const btn = document.getElementById('themeToggle');
  if (btn) {
    btn.textContent = theme === 'light' ? 'Dark' : 'Light';
    btn.addEventListener('click', function(){
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('autodj-theme', next);
      btn.textContent = next === 'light' ? 'Dark' : 'Light';
    });
  }
})();

// ─── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const use12Hour = (window.DJ && DJ.config && DJ.config.use12HourClock) !== false;
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour12: use12Hour, timeZone: DJ.config?.timezone});
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric', timeZone: DJ.config?.timezone});
}
setInterval(updateClock, 1000); updateClock();

// ─── State ────────────────────────────────────────────────────────────────────
let state = { nowPlaying: null, nextUp: null, queue: [], primaryDeck: 'a', decks: { a: null, b: null }, genre: '', messages: [], isPlaying: false, isFading: false, config: {} };
let baseElapsed = 0;
let baseTime = 0;
let currentTrackId = '';
let deckCueTime = 0;

// ─── Audio Main ───────────────────────────────────────────────────────────────
const audioMain = document.getElementById('audio-main');
let audioEnabled = false;
let currentStreamUrl = '';
let relayNeedsSeek = true;
const RELAY_SEEK_DRIFT_SEC = 1.6;

function seekRelayToBaseline() {
  try {
    const np = state.nowPlaying;
    if (!np || !audioMain.duration || !Number.isFinite(audioMain.duration)) return;
    const sinceUpdate = (Date.now() - baseTime) / 1000;
    let t = Math.min(Math.max(0, baseElapsed + sinceUpdate), (np.duration || audioMain.duration) - 0.15);
    if (audioMain.seekable && audioMain.seekable.length) {
      const end = audioMain.seekable.end(audioMain.seekable.length - 1);
      t = Math.min(t, Math.max(0, end - 0.08));
    }
    const cur = audioMain.currentTime || 0;
    if (Math.abs(cur - t) < 0.35 && !relayNeedsSeek) return;
    audioMain.currentTime = t;
  } catch (e) { console.warn('[AutoDJ][audio-main] seek', e); }
}

audioMain.addEventListener('ended', () => {
  const np = state.nowPlaying;
  if (np && np.duration > 0) {
    const sinceUpdate = (Date.now() - baseTime) / 1000;
    const interpolatedElapsed = baseElapsed + sinceUpdate;
    if (interpolatedElapsed < np.duration * 0.85) {
      console.warn('[AutoDJ][audio-main] ended at ' + fmt(interpolatedElapsed) + ' — re-seeking');
      relayNeedsSeek = true;
      seekRelayToBaseline();
      if (state.isPlaying) audioMain.play().catch(() => {});
      return;
    }
  }
  fetch('/api/playback/event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'ended' }) }).catch(() => {});
});
audioMain.addEventListener('error', () => {
  console.warn('[AutoDJ][audio-main] stream error — will retry');
  if (state.isPlaying && currentStreamUrl) {
    setTimeout(() => {
      audioMain.load();
      audioMain.play().catch(() => {});
    }, 2000);
  }
});
audioMain.addEventListener('loadedmetadata', () => {
  if (audioEnabled && state.isPlaying) seekRelayToBaseline();
});
audioMain.addEventListener('canplay', () => {
  if (audioEnabled && relayNeedsSeek && state.isPlaying) {
    relayNeedsSeek = false;
    seekRelayToBaseline();
    audioMain.play().catch(() => {});
  }
});

function toggleAudio() {
  const btn = document.getElementById('audio-listen-btn');
  if (!audioEnabled) {
    audioEnabled = true;
    btn.textContent = '🔊 Audio On';
    btn.classList.add('playing');
    if (currentStreamUrl) {
      audioMain.src = currentStreamUrl;
      audioMain.load();
      if (state.isPlaying) {
        audioMain.play().catch(e => console.warn('Audio relay:', e));
      }
    }
  } else {
    audioEnabled = false;
    btn.textContent = 'Enable Audio';
    btn.classList.remove('playing');
    audioMain.pause();
    relayNeedsSeek = true;
  }
}

function setRelayStream(url, shouldPlay) {
  if (!url || url === currentStreamUrl) return;
  currentStreamUrl = url;
  relayNeedsSeek = true;
  if (audioEnabled) {
    audioMain.src = url;
    audioMain.load();
    if (shouldPlay !== false) audioMain.play().catch(() => {});
  }
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/nowplaying/stream');
  es.onmessage = e => applyState(JSON.parse(e.data));
  es.onerror = () => setTimeout(connectSSE, 3000);
}
connectSSE();

function applyState(data) {
  const prevTrackId = currentTrackId;
  state = { ...state, ...data };
  
  // Store config for timezone/clock
  if (!window.DJ) window.DJ = {};
  if (!window.DJ.config) window.DJ.config = {};
  if (data.timezone) window.DJ.config.timezone = data.timezone;
  if (data.use12HourClock !== undefined) window.DJ.config.use12HourClock = data.use12HourClock;

  // Handle playback commands
  if (data.command === 'play') {
    const url = data.url || (data.nowPlaying?.youtubeId ? `/api/cache/stream/${encodeURIComponent(data.nowPlaying.youtubeId)}` : '');
    if (url) {
      if (!audioEnabled) {
        audioEnabled = true;
        const btn = document.getElementById('audio-listen-btn');
        if (btn) { btn.textContent = '🔊 Audio On'; btn.classList.add('playing'); }
      }
      currentStreamUrl = url;
      setRelayStream(url, true);
    }
  } else if (data.command === 'stop') {
    audioMain.pause();
    audioMain.src = '';
    const btn = document.getElementById('audio-listen-btn');
    if (btn) btn.classList.remove('playing');
    audioEnabled = false;
  } else if (!data.command && data.sessionActive && data.nowPlaying && data.nowPlaying.youtubeId && !audioMain.src) {
    if (!audioEnabled) {
      audioEnabled = true;
      const btn = document.getElementById('audio-listen-btn');
      if (btn) { btn.textContent = '🔊 Audio On'; if (data.isPlaying) btn.classList.add('playing'); }
    }
    const url = `/api/cache/stream/${encodeURIComponent(data.nowPlaying.youtubeId)}`;
    currentStreamUrl = url;
    setRelayStream(url, data.isPlaying);
  }

  // Derive nowPlaying from audible deck if null but deck data exists
  let np = state.nowPlaying;
  if (!np && state.decks) {
    const audibleDeck = state.primaryDeck || 'a';
    const d = state.decks[audibleDeck];
    if (d && d.title && d.title !== '—') {
      np = {
        title: d.title, artist: d.artist || '', album: d.album || '',
        duration: d.duration || 0, elapsed: d.elapsed || 0,
        artwork: d.artwork || '', youtubeId: d.youtubeId || null,
        streamUrl: d.streamUrl || '', fadePoint: d.fadePoint || null,
        tags: d.tags || []
      };
      state.nowPlaying = np;
    }
  }

  // Detect track change — reset interpolation baseline
  const trackId = np ? `${np.youtubeId || ''}::${np.title}::${np.artist}` : '';
  if (trackId !== prevTrackId) {
    currentTrackId = trackId;
    baseElapsed = np?.elapsed || 0;
    baseTime = Date.now();
    if (np?.streamUrl) setRelayStream(np.streamUrl, state.isPlaying);
    relayNeedsSeek = true;
  } else if (np && np.elapsed !== undefined) {
    baseElapsed = np.elapsed;
    baseTime = Date.now();
    if (audioEnabled && audioMain.src && state.isPlaying) {
      const cap = (np.duration && Number.isFinite(np.duration)) ? np.duration : (audioMain.duration && Number.isFinite(audioMain.duration) ? audioMain.duration : null);
      let target = np.elapsed;
      if (cap) target = Math.min(target, cap - 0.12);
      const drift = Math.abs((audioMain.currentTime || 0) - target);
      if (drift > RELAY_SEEK_DRIFT_SEC) {
        relayNeedsSeek = true;
        seekRelayToBaseline();
      }
    }
  }

  deckCueTime = Date.now();

  if (typeof data.isPlaying === 'boolean') {
    if (!data.isPlaying) {
      audioMain.pause();
      document.getElementById('audio-listen-btn')?.classList.remove('playing');
    } else if (audioEnabled && audioMain.src) {
      document.getElementById('audio-listen-btn')?.classList.add('playing');
      if (audioMain.paused) audioMain.play().catch(() => {});
    }
  }

  if (np) {
    setText('track-title', np.title || '—');
    setText('track-artist', np.artist || '—');
    setText('track-album', np.album || '');
    // Listener count
    if (data.listenerCount !== undefined) {
      document.getElementById('listener-count').textContent = data.listenerCount;
    }
    fetchLyrics(np.artist, np.title, np.duration, np.youtubeId);

    // Artwork
    const artImg = document.getElementById('album-art');
    const placeholder = document.getElementById('art-placeholder');
    const glow = document.getElementById('album-art-glow');
    if (np.artwork && np.artwork !== 'undefined' && np.artwork !== '') {
      artImg.src = np.artwork;
      artImg.style.display = 'block';
      placeholder.classList.remove('visible');
      glow.classList.add('active');
    } else {
      artImg.style.display = 'none';
      placeholder.classList.add('visible');
      glow.classList.remove('active');
    }
  }

  // Next up (queue)
  if (data.queue && data.queue.length > 0) {
    renderQueue(data.queue);
  } else if (data.nextUp) {
    renderQueue([data.nextUp]);
  } else {
    setText('next-title', '—');
    setText('next-artist', '—');
  }

  if (data.genre) setText('genre-display', data.genre);
  if (data.messages?.length) buildMarquee(data.messages);
  if (data.config) { state.config = data.config; fetchRssItems(); }
  document.getElementById('xfade-ind').classList.toggle('visible', !!data.isFading);

  const deckPanel = document.getElementById('deck-cues');
  if (data.decks && (data.decks.a?.title || data.decks.b?.title)) {
    deckPanel.classList.add('visible');
    ['a', 'b'].forEach(letter => {
      const d = data.decks[letter];
      if (!d) return;
      setText(`cue-${letter}-title`, d.title || '—');
      setText(`cue-${letter}-artist`, d.artist || '—');
      setText(`cue-${letter}-elapsed`, fmt(d.elapsed || 0));
      setText(`cue-${letter}-dur`, fmt(d.duration || 0));
      const el = document.getElementById(`cue-deck-${letter}`);
      if (el) el.style.opacity = d.isAudible ? '1' : '0.6';
    });
  } else if (deckPanel) deckPanel.classList.remove('visible');
}

function renderQueue(queue) {
  const items = queue.slice(0, 3);
  const pairs = [
    { title: 'next-title', artist: 'next-artist' },
    { title: 'next-title-2', artist: 'next-artist-2' },
    { title: 'next-title-3', artist: 'next-artist-3' }
  ];
  items.forEach((item, i) => {
    if (i < pairs.length) {
      setText(pairs[i].title, item.title || '—');
      setText(pairs[i].artist, item.artist || '—');
    }
  });
  // Hide unused items
  for (let i = items.length; i < pairs.length; i++) {
    setText(pairs[i].title, '—');
    setText(pairs[i].artist, '—');
  }
  const item3 = document.getElementById('nextup-item-3');
  if (item3) item3.style.display = queue.length >= 3 ? 'flex' : 'none';
}

// ─── Progress interpolation ───────────────────────────────────────────────────
function updateProgress() {
  const np = state.nowPlaying;
  if (!np) return;

  const sinceUpdate = (Date.now() - baseTime) / 1000;
  const elapsed = Math.min(baseElapsed + sinceUpdate, np.duration || 9999);
  const dur = np.duration || 0;
  if (dur <= 0) return;

  const pct = (elapsed / dur) * 100;
  const remain = dur - elapsed;

  setStyle('progress-fill', 'width', Math.min(pct, 100) + '%');
  setText('progress-elapsed', fmt(elapsed));
  setText('np-remaining', remain > 0 ? '-' + fmt(remain) : '0:00');
  setText('progress-duration', fmt(dur));

  if (state.isPlaying) updateLrcHighlight(elapsed);

  // Deck cue rows — light drift sync between SSE ticks
  if (state.decks) {
    const drift = (Date.now() - deckCueTime) / 1000;
    ['a', 'b'].forEach(letter => {
      const d = state.decks[letter];
      if (!d || !d.title) return;
      const elap = Math.min((d.elapsed || 0) + drift, (d.duration || 99999) - 0.05);
      setText(`cue-${letter}-elapsed`, fmt(Math.max(0, elap)));
    });
  }
}

setInterval(updateProgress, 300);

// ─── VU Meter animation ───────────────────────────────────────────────────────
let vuAnimId = null;
function animateVUMeter() {
  const container = document.getElementById('vu-container');
  if (!container) return;
  const bars = container.children;
  const playing = state.isPlaying;
  for (let i = 0; i < bars.length; i++) {
    const b = bars[i];
    if (playing) {
      const height = Math.random() * 28 + 4;
      b.style.height = height + 'px';
      b.classList.add('playing');
    } else {
      b.style.height = '2px';
      b.classList.remove('playing');
    }
  }
  vuAnimId = requestAnimationFrame(animateVUMeter);
}
animateVUMeter();

// ─── Marquee ──────────────────────────────────────────────────────────────────
let builtMessages = [];
let rssItems = [];
let rssFetchTimer = 0;
async function fetchRssItems() {
  const now = Date.now();
  if (now - rssFetchTimer < 120000) return;
  rssFetchTimer = now;
  try {
    const cfg = state.config || {};
    const url = cfg.rssFeedUrl || '';
    if (!url) { rssItems = []; return; }
    const r = await fetch(`/api/rss?url=${encodeURIComponent(url)}`);
    const d = await r.json();
    rssItems = (d.items || []).map(i => i.title);
  } catch (e) { rssItems = []; }
}
function buildMarquee(messages) {
  const cfg = state.config || {};
  const mode = cfg.marqueeMode || 'rss';
  let combined = [];
  if (mode === 'rss' || mode === 'both') {
    if (rssItems.length) {
      const picks = [...rssItems].sort(() => Math.random() - 0.5).slice(0, 5);
      combined.push(...picks);
    }
  }
  if (mode === 'messages' || mode === 'both') {
    combined.push(...messages);
  }
  if (!combined.length) {
    combined = ['🎵 AutoDJ warming up...', '🔊 Open DJ Console to begin', '🎧 Connect speakers and press play'];
  }
  if (JSON.stringify(combined) === JSON.stringify(builtMessages)) return;
  builtMessages = combined;

  const track = document.getElementById('marquee-track');
  if (!track) return;
  const html = combined.map(m => `<span class="marquee-msg">${m}</span>`).join('');
  // Duplicate for seamless loop
  track.innerHTML = html + html;
  track.style.animationDuration = Math.max(30, Math.max(combined.length, 1) * 6) + 's';
}
buildMarquee(['🎵 AutoDJ warming up...', '🔊 Open DJ Console to begin', '🎧 Connect speakers and press play']);
setInterval(async () => { await fetchRssItems(); buildMarquee(state.messages || []); }, 300000);

// ─── Art pulse on track change ────────────────────────────────────────────────
let lastTitle = '';
setInterval(() => {
  const title = state.nowPlaying?.title || '';
  if (title !== lastTitle) {
    lastTitle = title;
    const glow = document.getElementById('album-art-glow');
    if (glow) {
      glow.style.opacity = '0.9';
      setTimeout(() => glow.classList.contains('active') && (glow.style.opacity = ''), 800);
    }
  }
}, 1000);

// ─── Fallback poll ────────────────────────────────────────────────────────────
setInterval(async () => {
  try { applyState(await (await fetch('/api/nowplaying')).json()); } catch(e) {}
  try {
    const lr = await (await fetch('/api/listeners')).json();
    document.getElementById('listener-count').textContent = lr.count;
  } catch(e) {}
}, 8000);

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s) || s < 0) return '0:00';
  const sec = Math.round(s);
  if (sec <= 0) return '0:00';
  const m = Math.floor(sec / 60);
  const secs = sec % 60;
  if (m >= 60) return `${Math.floor(m/60)}:${(m%60).toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  return `${m}:${secs.toString().padStart(2,'0')}`;
}
function setText(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }
function setStyle(id, prop, val) { const e = document.getElementById(id); if (e) e.style[prop] = val; }

// ─── Lyrics (LRCLIB) ──────────────────────────────────────────────────────────
let currentLyricsKey = '';
function escapeHtml(s) {
  const e = document.createElement('span');
  e.textContent = s == null ? '' : String(s);
  return e.innerHTML;
}
function parseLrcLines(syncedText) {
  const out = [];
  for (const line of String(syncedText).split(/\r?\n/)) {
    const tags = [...line.matchAll(/\[(\d+):(\d{2})(?:\.(\d{1,3}))?\]/g)];
    if (!tags.length) continue;
    const text = line.replace(/\[\d+:\d{2}(?:\.\d+)?\]/g, '').trim();
    if (!text) continue;
    for (const m of tags) {
      const mm = parseInt(m[1], 10), ss = parseInt(m[2], 10);
      const frac = m[3] != null ? parseInt(String(m[3]).padEnd(3, '0').slice(0, 3), 10) / 1000 : 0;
      out.push({ t: mm * 60 + ss + frac, text });
    }
  }
  out.sort((a, b) => a.t - b.t);
  return out;
}
function updateLrcHighlight(elapsed) {
  const syncTime = (audioEnabled && audioMain && audioMain.readyState >= 2 && !isNaN(audioMain.currentTime))
    ? audioMain.currentTime : elapsed;
  const lines = document.querySelectorAll('#lyrics-content .lrc-line');
  if (!lines.length) return;
  let active = -1;
  let nextT = Infinity;
  for (let i = 0; i < lines.length; i++) {
    const t0 = parseFloat(lines[i].dataset.t);
    const t1 = i + 1 < lines.length ? parseFloat(lines[i + 1].dataset.t) : Infinity;
    if (syncTime >= t0 - 0.3 && syncTime < t1) { active = i; nextT = t1; break; }
  }
  lines.forEach((el, i) => {
    if (i === active) {
      el.classList.add('active');
      if (nextT < Infinity && nextT > 0) {
        const pct = Math.min(1, Math.max(0, (elapsed - parseFloat(el.dataset.t)) / (nextT - parseFloat(el.dataset.t))));
        el.style.opacity = (1 - pct * 0.45).toFixed(2);
      } else {
        el.style.opacity = '1';
      }
    } else {
      el.classList.remove('active');
      el.style.opacity = '';
    }
  });
  if (active >= 0 && lines[active]) {
    const panel = document.getElementById('lyrics-panel');
    if (panel) {
      const panelRect = panel.getBoundingClientRect();
      const lineRect = lines[active].getBoundingClientRect();
      const lineH = lines[active].offsetHeight || 24;
      const relTop = lineRect.top - panelRect.top + panel.scrollTop;
      const centerTarget = relTop - (panel.clientHeight / 2) + (lineH / 2);
      if (Math.abs(panel.scrollTop - centerTarget) > lineH) {
        panel.scrollTop = Math.max(0, centerTarget);
      }
    }
  }
}
async function fetchLyrics(artist, title, duration, youtubeId) {
  const key = `${youtubeId || ''}::${artist}::${title}`;
  if (key === currentLyricsKey || !artist || !title || artist === '—') return;
  currentLyricsKey = key;
  const panel = document.getElementById('lyrics-panel');
  const content = document.getElementById('lyrics-content');
  const src = document.getElementById('lyrics-source');
  try {
    let url = `/api/lyrics?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`;
    let d = duration ? Math.round(parseFloat(duration)) : 0;
    if (d > 1e11) d = Math.round(d / 1000);
    if (d < 10) d = 0;
    if (d) url += `&duration=${d}`;
    const r = await fetch(url);
    const data = await r.json();
    if (data.synced || data.plain) {
      if (panel) panel.style.display = 'block';
      if (content) {
        if (data.synced) {
          const rows = parseLrcLines(data.synced);
          if (rows.length) {
            content.innerHTML = rows.map(l => `<div class="lrc-line" data-t="${l.t}">${escapeHtml(l.text)}</div>`).join('');
          } else {
            content.textContent = data.synced.replace(/\[\d+:\d{2}(?:\.\d+)?\]\s*/g, '');
          }
        } else {
          content.textContent = data.plain;
        }
      }
      if (src) src.textContent = `♪ lyrics via ${data.source || 'lrclib'}`;
    } else {
      if (panel) panel.style.display = 'none';
    }
  } catch(e) { if (panel) panel.style.display = 'none'; }
}

// ─── WebRTC Receive ──────────────────────────────────────────────────────────
let _webrtcState = null;
async function tryConnectWebRTC() {
  if (_webrtcState) return;
  const audioEl = document.getElementById('webrtc-audio') || (() => {
    const el = document.createElement('audio');
    el.id = 'webrtc-audio';
    el.autoplay = true;
    el.style.display = 'none';
    document.body.appendChild(el);
    return el;
  })();
  try {
    const r = await fetch('/api/webrtc/offer');
    const offer = await r.json();
    if (!offer || !offer.sdp) return;
    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    _webrtcState = { pc };
    let stream = null;
    pc.ontrack = (e) => {
      stream = e.streams[0];
      if (stream && audioEl) {
        audioEl.srcObject = stream;
        audioEl.play().catch(() => {});
      }
    };
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await fetch('/api/webrtc/answer', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type })
    });
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        fetch('/api/webrtc/ice', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ candidate: e.candidate.candidate, sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex })
        }).catch(() => {});
      }
    };
  } catch (e) { /* no broadcast available */ }
}
setTimeout(tryConnectWebRTC, 1000);
