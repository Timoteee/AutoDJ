<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#00e5ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AutoDJ">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>AutoDJ — Now Playing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syncopate:wght@400;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03050a;
  --accent: #00e5ff;
  --accent2: #ff3366;
  --accent3: #a855f7;
  --green: #00ff88;
  --yellow: #ffcc00;
  --text: #c8d6e8;
  --muted: #3d5068;
  --border: #1a2433;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Mono', monospace; display: flex; flex-direction: column; height: 100vh; position: relative; }

/* ─── Dynamic blurred background art ─── */
.bg-art {
  position: fixed; inset: -40px; z-index: 0;
  background-size: cover; background-position: center;
  filter: blur(50px) brightness(0.22) saturate(1.6);
  transform: scale(1.2);
  transition: opacity 1.8s ease;
  opacity: 0;
}
.bg-art.visible { opacity: 1; }

/* Grid + dark overlay on top of bg-art */
.bg-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.bg-grid { position: absolute; inset: 0;
  background-image: linear-gradient(rgba(0,229,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.018) 1px,transparent 1px);
  background-size: 48px 48px; }
.bg-overlay { position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(3,5,10,0.55) 0%, rgba(3,5,10,0.25) 40%, rgba(3,5,10,0.75) 100%); }

/* Layout */
.display { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100vh; padding: 28px 52px 74px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0; flex-shrink: 0; }
.logo-word { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; }
.live-badge { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 3px; color: var(--accent2); margin-top: 4px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: blink 1s infinite alternate; }
@keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
.current-time { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: 4px; text-shadow: 0 0 30px rgba(0,229,255,0.35); }
.current-date { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 3px; }
.xfade-indicator { font-size: 10px; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; animation: blink 0.5s infinite; display: none; margin-top: 3px; }
.xfade-indicator.visible { display: block; }
.listeners { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }

/* Audio button */
.audio-btn {
  display: none; margin-top: 6px;
  background: rgba(0,229,255,0.08); border: 1px solid var(--accent);
  color: var(--accent); font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 2px; padding: 5px 12px;
  cursor: pointer; border-radius: 2px; transition: all 0.2s;
}
.audio-btn.visible { display: block; }
.audio-btn.playing { background: rgba(0,255,136,0.1); border-color: var(--green); color: var(--green); }

/* Album art — spinning vinyl */
.art-area {
  position: fixed; right: 52px; top: 50%; transform: translateY(-55%);
  width: min(260px, 20vw); aspect-ratio: 1; z-index: 2;
}
.art-circle {
  width: 100%; height: 100%; border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.15);
  overflow: hidden;
  box-shadow: 0 0 60px rgba(0,229,255,0.08);
  animation: spin 30s linear infinite;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.art-circle.paused { animation-play-state: paused; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.art-inner { animation: spin-rev 30s linear infinite; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
@keyframes spin-rev { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
#art-img { width: 100%; height: 100%; object-fit: cover; display: none; }
.no-art-rings { position: absolute; inset: 0; }
.ring { position: absolute; border: 1px solid rgba(0,229,255,0.06); border-radius: 50%; }

/* Main content */
.now-playing-block { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 62%; }
.np-label { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.np-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

.genre-badge { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent3);
  background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2);
  padding: 3px 12px; border-radius: 20px; display: inline-block; margin-bottom: 14px; transition: all 0.5s; }

.big-title { font-family: 'Syncopate', sans-serif; font-size: clamp(24px, 4vw, 58px); font-weight: 700;
  color: #fff; line-height: 1.1; margin-bottom: 8px; letter-spacing: 1px;
  text-shadow: 0 0 40px rgba(255,255,255,0.06); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.big-artist { font-size: clamp(14px, 2vw, 28px); color: var(--accent); font-weight: 300;
  letter-spacing: 4px; margin-bottom: 6px; text-shadow: 0 0 25px rgba(0,229,255,0.25); }
.big-album { font-size: clamp(11px, 1.1vw, 16px); color: var(--muted); letter-spacing: 2px; margin-bottom: 20px; font-style: italic; }

/* Progress */
.mega-progress { position: relative; margin-bottom: 8px; }
.mega-progress-bg { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: visible; position: relative; }
.mega-progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,var(--accent2),var(--accent));
  box-shadow: 0 0 16px rgba(0,229,255,0.35); transition: width 0.35s linear; }
.fade-zone { position: absolute; top: -4px; height: 13px; background: rgba(255,204,0,0.12);
  border-left: 2px solid var(--yellow); border-radius: 2px; pointer-events: none; display: none; }
.progress-times { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }
.time-left { color: var(--accent2); font-size: 13px; font-family: 'Orbitron'; }

/* Next up */
.next-up-block { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.04);
  border-radius: 4px; padding: 10px 16px; display: flex; align-items: center; gap: 14px; margin-top: 16px; }
.next-label { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.next-title { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.next-artist { font-size: 10px; color: var(--muted); }
.next-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.06); flex-shrink: 0; }
.next-art { width: 32px; height: 32px; border-radius: 3px; object-fit: cover; flex-shrink: 0; display: none; }

/* Recently played */
.recent-block { margin-top: 14px; }
.recent-label { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.recent-list { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.recent-list::-webkit-scrollbar { height: 2px; }
.recent-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }
.recent-item { flex-shrink: 0; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.03);
  border-radius: 3px; padding: 5px 10px; max-width: 170px; }
.recent-item .ri-title { font-size: 10px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recent-item .ri-artist { font-size: 8px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Marquee */
.marquee-bar { position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to right, rgba(0,229,255,0.06), rgba(255,51,102,0.06));
  border-top: 1px solid rgba(255,255,255,0.04); padding: 8px 0; overflow: hidden; z-index: 10; height: 34px; }
.marquee-track { display: flex; gap: 80px; animation: marquee 40s linear infinite; white-space: nowrap; }
.marquee-track:hover { animation-play-state: paused; }
@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.marquee-msg { font-size: 11px; color: var(--text); letter-spacing: 1px; flex-shrink: 0; }
.marquee-msg span { color: var(--accent); margin-right: 4px; }

/* Side viz */
.side-viz { position: fixed; bottom: 34px; display: flex; align-items: flex-end; gap: 2px; height: 36px; z-index: 3; }
.side-viz.left { left: 16px; }
.side-viz.right { right: 16px; }
.side-viz-bar { width: 3px; border-radius: 2px; background: var(--accent); opacity: 0.3; min-height: 2px; transition: height 0.09s ease; }

/* Responsive */
@media (max-width: 900px) {
  .display { padding: 16px 24px 70px; }
  .art-area { position: relative; right: auto; top: auto; transform: none; width: 140px; margin: 0 auto 12px; }
  .now-playing-block { max-width: 100%; }
  .big-title { font-size: 20px; }
  .big-artist { font-size: 15px; }
}
</style>
</head>
<body>

<!-- Dynamic blurred background art -->
<div class="bg-art" id="bg-art"></div>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-overlay"></div>
</div>

<!-- Album art (fixed right) -->
<div class="art-area">
  <div class="art-circle" id="art-circle">
    <div class="art-inner">
      <img id="art-img" alt="Album Art">
      <div class="no-art-rings" id="no-art-rings">
        <div class="ring" style="inset:8%"></div>
        <div class="ring" style="inset:22%"></div>
        <div class="ring" style="inset:38%"></div>
      </div>
    </div>
  </div>
</div>

<div class="display">
  <div class="header">
    <div>
      <div class="logo-word">AutoDJ</div>
      <div class="live-badge"><div class="live-dot"></div> LIVE MIX</div>
    </div>
    <div style="text-align:right">
      <div class="current-time" id="clock">00:00:00</div>
      <div class="current-date" id="date-display"></div>
      <div class="xfade-indicator" id="xfade-ind">⇄ CROSSFADING</div>
      <div class="listeners" id="listener-count"></div>
      <button class="audio-btn visible" id="audio-listen-btn" onclick="toggleAudio()">🔇 Enable Audio</button>
    </div>
  </div>

  <div class="now-playing-block">
    <div class="np-label">Now Playing</div>
    <div class="genre-badge" id="genre-display">— Waiting —</div>
    <div class="big-title" id="np-title">AutoDJ</div>
    <div class="big-artist" id="np-artist">Open DJ Console to start</div>
    <div class="big-album" id="np-album"></div>

    <div class="mega-progress">
      <div class="mega-progress-bg">
        <div class="mega-progress-fill" id="np-progress" style="width:0%"></div>
        <div class="fade-zone" id="fade-zone"></div>
      </div>
    </div>
    <div class="progress-times">
      <span id="np-elapsed">0:00</span>
      <span class="time-left" id="np-remaining">—</span>
      <span id="np-duration">0:00</span>
    </div>

    <div class="next-up-block">
      <div class="next-label">Next Up</div>
      <div class="next-divider"></div>
      <img class="next-art" id="next-art" alt="">
      <div style="overflow:hidden;flex:1">
        <div class="next-title" id="np-next-title">—</div>
        <div class="next-artist" id="np-next-artist">—</div>
      </div>
    </div>

    <div class="recent-block" id="recent-block" style="display:none">
      <div class="recent-label">Recently Played</div>
      <div class="recent-list" id="recent-list"></div>
    </div>
  </div>
</div>

<!-- Side visualizers -->
<div class="side-viz left" id="viz-left"></div>
<div class="side-viz right" id="viz-right"></div>

<!-- Song Request Form -->
<div id="request-form" style="position:fixed;bottom:40px;right:16px;z-index:8">
  <button id="req-toggle" onclick="toggleRequestForm()" style="background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:var(--accent3);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:6px 12px;cursor:pointer;border-radius:2px">🎤 Request</button>
  <div id="req-panel" style="display:none;background:rgba(3,5,10,0.95);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:6px;width:240px">
    <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent3);margin-bottom:8px">Song Request</div>
    <input id="req-artist" placeholder="Artist" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);font-family:inherit;padding:5px 8px;font-size:11px;border-radius:2px;margin-bottom:4px;outline:none">
    <input id="req-title" placeholder="Song title" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);font-family:inherit;padding:5px 8px;font-size:11px;border-radius:2px;margin-bottom:4px;outline:none">
    <input id="req-msg" placeholder="Message (optional)" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);font-family:inherit;padding:5px 8px;font-size:11px;border-radius:2px;margin-bottom:6px;outline:none">
    <button onclick="submitRequest()" style="width:100%;background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.4);color:var(--accent3);font-family:inherit;font-size:10px;padding:6px;cursor:pointer;border-radius:2px;letter-spacing:1px">Submit Request</button>
    <div id="req-status" style="font-size:9px;margin-top:4px;min-height:14px"></div>
  </div>
</div>

<!-- Marquee -->
<div class="marquee-bar">
  <div class="marquee-track" id="marquee-track"></div>
</div>

<!-- ─── Dual audio elements for crossfade relay ─── -->
<audio id="relay-a" preload="none" crossorigin="anonymous"></audio>
<audio id="relay-b" preload="none" crossorigin="anonymous"></audio>

<script>
// ─── Init viz bars ───────────────────────────────────────────────────────────
['viz-left','viz-right'].forEach(id => {
  const el = document.getElementById(id);
  for (let i = 0; i < 10; i++) { const b = document.createElement('div'); b.className = 'side-viz-bar'; el.appendChild(b); }
});

// ─── Clock ───────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
setInterval(updateClock, 1000); updateClock();

// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  nowPlaying: null, nextUp: null, genre: '', messages: [],
  isPlaying: false, isFading: false,
  recentlyPlayed: [], bgArtSource: 'track',
  bgImageUrl: '', artistImageUrl: '',
  deckState: null
};
let baseElapsed = 0;
let baseTime = 0;
let currentTrackId = '';
let hasReceivedData = false;

// ─── Dual Audio Relay — Web Audio API crossfade matching DJ page ─────────────
const relayA = document.getElementById('relay-a');
const relayB = document.getElementById('relay-b');
let audioCtx = null;
let gainA = null, gainB = null;
let sourceA = null, sourceB = null;
let audioEnabled = false;
let loadedStreamA = '', loadedStreamB = '';

function initAudioCtx() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    gainA = audioCtx.createGain(); gainA.gain.value = 1;
    gainB = audioCtx.createGain(); gainB.gain.value = 0;

    sourceA = audioCtx.createMediaElementSource(relayA);
    sourceA.connect(gainA);
    gainA.connect(audioCtx.destination);

    sourceB = audioCtx.createMediaElementSource(relayB);
    sourceB.connect(gainB);
    gainB.connect(audioCtx.destination);
    // Add master limiter
    setupLimiter();
  } catch(e) { console.warn('AudioCtx init:', e.message); }
}

function toggleAudio() {
  const btn = document.getElementById('audio-listen-btn');
  if (!audioEnabled) {
    audioEnabled = true;
    initAudioCtx();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    btn.textContent = '🔊 Audio On';
    btn.classList.add('playing');
    syncAudio();
  } else {
    audioEnabled = false;
    btn.textContent = '🔇 Enable Audio';
    btn.classList.remove('playing');
    relayA.pause(); relayB.pause();
  }
}

// Sync dual audio to match DJ deck state
function syncAudio() {
  if (!audioEnabled) return;
  const ds = state.deckState;

  if (!ds) {
    // Fallback: single stream mode
    const url = state.nowPlaying?.streamUrl;
    if (url && url !== loadedStreamA) { loadedStreamA = url; relayA.src = url; relayA.play().catch(()=>{}); }
    if (gainA) gainA.gain.value = 1;
    if (gainB) gainB.gain.value = 0;
    return;
  }

  const dA = ds.decks?.a;
  const dB = ds.decks?.b;

  // Load streams on each relay element matching the DJ's decks
  if (dA?.track?.streamUrl && dA.track.streamUrl !== loadedStreamA) {
    loadedStreamA = dA.track.streamUrl;
    relayA.src = loadedStreamA;
    relayA.play().catch(()=>{});
  }
  if (dB?.track?.streamUrl && dB.track.streamUrl !== loadedStreamB) {
    loadedStreamB = dB.track.streamUrl;
    relayB.src = loadedStreamB;
    relayB.play().catch(()=>{});
  }

  // Mirror gain values from DJ page so crossfade sounds the same
  const gA = dA?.gain ?? (ds.activeDeck === 'a' ? 1 : 0);
  const gB = dB?.gain ?? (ds.activeDeck === 'b' ? 1 : 0);

  if (gainA) {
    // Smooth gain transitions to avoid clicks
    gainA.gain.setTargetAtTime(gA, audioCtx.currentTime, 0.05);
  }
  if (gainB) {
    gainB.gain.setTargetAtTime(gB, audioCtx.currentTime, 0.05);
  }
}

// ─── SSE — robust reconnect (2s retry, 5s fallback poll) ─────────────────────
let sseSource = null;
let sseRetryTimer = null;
let sseConnected = false;
let sseFailed = false;

function connectSSE() {
  if (sseSource) { try { sseSource.close(); } catch(e) {} }
  clearTimeout(sseRetryTimer);

  try {
    sseSource = new EventSource('/api/nowplaying/stream');
  } catch(e) { sseFailed = true; return; }

  sseSource.onopen = () => {
    sseConnected = true;
    sseFailed = false;
  };

  sseSource.onmessage = e => {
    try { applyState(JSON.parse(e.data)); } catch(err) { console.error('SSE parse:', err); }
  };

  sseSource.onerror = () => {
    sseConnected = false;
    try { sseSource.close(); } catch(e) {}
    // Retry after 2 seconds
    sseRetryTimer = setTimeout(connectSSE, 2000);
  };
}
connectSSE();

// Fallback poll — 5s when SSE is disconnected
setInterval(async () => {
  if (sseConnected) return;
  try { applyState(await (await fetch('/api/nowplaying')).json()); } catch(e) {}
}, 5000);

// ─── Apply incoming state ────────────────────────────────────────────────────
function applyState(data) {
  const np = data.nowPlaying;

  // Detect track change — reset interpolation baseline
  const trackId = np ? `${np.title}::${np.artist}` : '';
  if (trackId !== currentTrackId) {
    currentTrackId = trackId;
    baseElapsed = np?.elapsed || 0;
    baseTime = Date.now();
  } else if (np && np.elapsed !== undefined) {
    // Resync elapsed
    baseElapsed = np.elapsed;
    baseTime = Date.now();
  }

  // Merge state
  if (data.deckState) state.deckState = data.deckState;
  state = { ...state, ...data };

  // ── Clear stuck waiting/warming messages immediately ──
  if (!hasReceivedData && np && np.title) {
    hasReceivedData = true;
    const genreEl = document.getElementById('genre-display');
    if (genreEl && (genreEl.textContent === '— Waiting —' || genreEl.textContent === '')) {
      genreEl.textContent = '';
    }
  }

  // ── Update now playing display ──
  if (np) {
    setText('np-title', np.title || 'Unknown Title');
    setText('np-artist', np.artist || 'Unknown Artist');
    setText('np-album', np.album || '');

    // Album art (spinning vinyl)
    const artImg = document.getElementById('art-img');
    const noArt = document.getElementById('no-art-rings');
    const artSrc = np.artwork || np.image || '';
    if (artSrc && artSrc !== 'undefined') {
      artImg.src = artSrc;
      artImg.style.display = 'block';
      if (noArt) noArt.style.display = 'none';
    } else {
      artImg.style.display = 'none';
      if (noArt) noArt.style.display = 'block';
    }

    // Background art (blurred behind everything)
    updateBgArt(data);
  }

  // Vinyl spin pauses when not playing
  const artCircle = document.getElementById('art-circle');
  if (artCircle) artCircle.classList.toggle('paused', !state.isPlaying);

  // Next up
  if (data.nextUp) {
    setText('np-next-title', data.nextUp.title || '—');
    setText('np-next-artist', data.nextUp.artist || '—');
    const nextArt = document.getElementById('next-art');
    if (data.nextUp.artwork) { nextArt.src = data.nextUp.artwork; nextArt.style.display = 'block'; }
    else nextArt.style.display = 'none';
  } else {
    setText('np-next-title', '—'); setText('np-next-artist', '—');
    const na = document.getElementById('next-art'); if (na) na.style.display = 'none';
  }

  // Genre badge
  if (data.genre) setText('genre-display', data.genre);

  // Marquee messages (static or RSS)
  if (data.messages?.length) buildMarquee(data.messages);

  // Recently played
  if (data.recentlyPlayed?.length) renderRecentlyPlayed(data.recentlyPlayed);

  // Crossfading indicator
  const xf = document.getElementById('xfade-ind');
  if (xf) xf.classList.toggle('visible', !!data.isFading);

  // Sync audio relay to match DJ deck gains
  syncAudio();
}

// ─── Background Art ──────────────────────────────────────────────────────────
let currentBgUrl = '';
function updateBgArt(data) {
  const bgEl = document.getElementById('bg-art');
  if (!bgEl) return;
  const source = data.bgArtSource || state.bgArtSource || 'track';
  let imgUrl = '';

  if (source === 'artist' && data.artistImageUrl) {
    imgUrl = data.artistImageUrl;
  } else {
    imgUrl = data.bgImageUrl || data.nowPlaying?.artwork || data.nowPlaying?.image || '';
  }

  if (imgUrl && imgUrl !== 'undefined' && imgUrl !== currentBgUrl) {
    currentBgUrl = imgUrl;
    // Preload then swap for smooth transition
    const img = new Image();
    img.onload = () => {
      bgEl.style.backgroundImage = `url(${imgUrl})`;
      bgEl.classList.add('visible');
    };
    img.src = imgUrl;
  } else if (!imgUrl) {
    bgEl.classList.remove('visible');
    currentBgUrl = '';
  }
}

// ─── Recently Played ─────────────────────────────────────────────────────────
let lastRecentHash = '';
function renderRecentlyPlayed(tracks) {
  const block = document.getElementById('recent-block');
  const list = document.getElementById('recent-list');
  if (!block || !list || !tracks.length) return;

  const hash = tracks.map(t => t.title).join('::');
  if (hash === lastRecentHash) return;
  lastRecentHash = hash;

  block.style.display = 'block';
  list.innerHTML = tracks.slice(0, 8).map(t =>
    `<div class="recent-item"><div class="ri-title">${esc(t.title)}</div><div class="ri-artist">${esc(t.artist)}</div></div>`
  ).join('');
}

// ─── Progress interpolation (smooth between SSE updates) ─────────────────────
function updateProgress() {
  const np = state.nowPlaying;
  if (!np || !state.isPlaying) return;

  const sinceUpdate = (Date.now() - baseTime) / 1000;
  const elapsed = Math.min(baseElapsed + sinceUpdate, np.duration || 9999);
  const dur = np.duration || 0;
  if (dur <= 0) return;

  const pct = (elapsed / dur) * 100;
  const remain = dur - elapsed;

  setStyle('np-progress', 'width', Math.min(pct, 100) + '%');
  setText('np-elapsed', fmt(elapsed));
  setText('np-remaining', remain > 0 ? '-' + fmt(remain) : '0:00');
  setText('np-duration', fmt(dur));

  // Fade zone marker
  const fp = np.fadePoint;
  const fz = document.getElementById('fade-zone');
  if (fp && fp < dur) {
    fz.style.display = 'block';
    fz.style.left = ((fp / dur) * 100) + '%';
    fz.style.width = (((dur - fp) / dur) * 100) + '%';
  } else if (fz) {
    fz.style.display = 'none';
  }
}
setInterval(updateProgress, 250);

// ─── Marquee (static messages or RSS headlines) ──────────────────────────────
let builtMessages = [];
function buildMarquee(messages) {
  if (JSON.stringify(messages) === JSON.stringify(builtMessages)) return;
  builtMessages = messages;
  const track = document.getElementById('marquee-track');
  const all = [...messages, ...messages]; // duplicate for seamless loop
  track.innerHTML = all.map(m => `<div class="marquee-msg"><span>◆</span>${m}</div>`).join('');
  track.style.animationDuration = Math.max(25, messages.length * 4) + 's';
}
buildMarquee(['🎵 AutoDJ warming up...', '🔊 Open DJ Console to begin', '🎧 Connect speakers and press play']);

// ─── Visualizer ──────────────────────────────────────────────────────────────
function animateViz() {
  const playing = state.isPlaying;
  ['viz-left','viz-right'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    for (const b of el.children) {
      b.style.height = (playing ? Math.random()*30+3 : 2) + 'px';
      b.style.opacity = playing ? (0.25 + Math.random() * 0.4) : 0.07;
    }
  });
}
setInterval(animateViz, 90);

// ─── Art pulse on track change ───────────────────────────────────────────────
let lastPulseTitle = '';
setInterval(() => {
  const title = state.nowPlaying?.title || '';
  if (title && title !== lastPulseTitle) {
    lastPulseTitle = title;
    const c = document.getElementById('art-circle');
    if (c) {
      c.style.boxShadow = '0 0 100px rgba(0,229,255,0.3)';
      setTimeout(() => { if (c) c.style.boxShadow = '0 0 60px rgba(0,229,255,0.08)'; }, 1200);
    }
  }
}, 1000);

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s) || !isFinite(s) || s < 0) return '0:00';
  if (s > 36000) s = Math.round(s / 1000);
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  if (m >= 60) return `${Math.floor(m/60)}:${(m%60).toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function setText(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }
function setStyle(id, prop, val) { const e = document.getElementById(id); if (e) e.style[prop] = val; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Song Request Form ──────────────────────────────────────────────────────
function toggleRequestForm() {
  const p = document.getElementById('req-panel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

async function submitRequest() {
  const artist = document.getElementById('req-artist').value.trim();
  const title = document.getElementById('req-title').value.trim();
  const message = document.getElementById('req-msg').value.trim();
  const status = document.getElementById('req-status');
  if (!artist && !title) { status.textContent = 'Enter artist or title'; status.style.color = 'var(--accent2)'; return; }
  try {
    status.textContent = 'Sending...'; status.style.color = 'var(--accent)';
    const r = await fetch('/api/requests', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ artist, title, message }) });
    if (r.ok) {
      status.textContent = '✓ Request sent!'; status.style.color = 'var(--green)';
      document.getElementById('req-artist').value = '';
      document.getElementById('req-title').value = '';
      document.getElementById('req-msg').value = '';
      setTimeout(() => { status.textContent = ''; }, 3000);
    } else { status.textContent = 'Failed to send'; status.style.color = 'var(--accent2)'; }
  } catch(e) { status.textContent = 'Error: ' + e.message; status.style.color = 'var(--accent2)'; }
}

// ─── Master Limiter (prevents clipping during crossfades) ────────────────────
function setupLimiter() {
  if (!audioCtx) return;
  try {
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -6;
    comp.knee.value = 10;
    comp.ratio.value = 4;
    comp.attack.value = 0.003;
    comp.release.value = 0.25;
    // Re-route gains through limiter
    if (gainA) { gainA.disconnect(); gainA.connect(comp); }
    if (gainB) { gainB.disconnect(); gainB.connect(comp); }
    comp.connect(audioCtx.destination);
  } catch(e) { console.warn('Limiter setup failed:', e); }
}

// ─── Listener Count ──────────────────────────────────────────────────────────
async function pollListenerCount() {
  try {
    const r = await fetch('/api/listeners');
    const data = await r.json();
    const el = document.getElementById('listener-count');
    if (el) {
      const n = data.count || 0;
      el.textContent = n > 0 ? `👁 ${n} listener${n !== 1 ? 's' : ''} connected` : '';
    }
  } catch(e) {}
}
setInterval(pollListenerCount, 12000);
pollListenerCount();

// ─── PWA Service Worker ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
