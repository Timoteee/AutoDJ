<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#121212" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme:light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="AutoDJ — now playing display with persistent audio">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>AutoDJ — Now Playing</title>
<link rel="stylesheet" href="/css/shared.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syncopate:wght@400;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a12;
  --bg2: #10101c;
  --surface: #1a1a2a;
  --accent: #d97706;
  --accent-hover: #f59e0b;
  --accent2: #f59e0b;
  --accent3: #a855f7;
  --green: #10b981;
  --yellow: #f59e0b;
  --text: #d4d4de;
  --bright: #f0f0fa;
  --muted: #7a7a8a;
  --border: rgba(217,119,6,0.15);
  --glow-g: rgba(16,185,129,0.12);
  --glow-r: rgba(239,68,68,0.12);
  --glow-a: rgba(217,119,6,0.2);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --transition: 200ms ease;
}
[data-theme="light"] {
  --bg: #f8f6f0;
  --bg2: #eeebe4;
  --surface: #dddacf;
  --accent: #b76506;
  --accent-hover: #d97706;
  --accent2: #d97706;
  --accent3: #7c3aed;
  --green: #059669;
  --yellow: #d97706;
  --text: #2d2a24;
  --bright: #1a1814;
  --muted: #8a8578;
  --border: rgba(217,119,6,0.2);
  --glow-g: rgba(5,150,105,0.1);
  --glow-r: rgba(239,68,68,0.08);
  --glow-a: rgba(217,119,6,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); }
body {
  font-family: 'DM Mono', monospace; display: flex; flex-direction: column;
  min-height: 100vh; position: relative; overflow-y: auto; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
/* Background depth */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 30%, var(--glow-a) 0%, transparent 65%),
    repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.012) 50px),
    repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.012) 50px);
  pointer-events: none; z-index: 0;
}
body::-webkit-scrollbar { width: 4px; }
body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

*, *::before, *::after { transition: background-color var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition); }
/* BG */
.bg-layer { position: fixed; inset: 0; z-index: 0; }
.bg-grid { position: absolute; inset: 0;
  background-image: linear-gradient(rgba(217,119,6,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(217,119,6,0.04) 1px,transparent 1px);
  background-size: 48px 48px; }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.08; animation: drift 20s ease-in-out infinite alternate; }
.orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -100px; }
.orb2 { width: 500px; height: 500px; background: var(--accent2); bottom: -200px; left: -100px; animation-delay: -7s; }
.orb3 { width: 400px; height: 400px; background: var(--accent3); top: 50%; left: 40%; transform: translate(-50%,-50%); animation-delay: -13s; }
@keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.1); } }

/* Layout */
.display { position: relative; z-index: 11; display: flex; flex-direction: column; min-height: 100vh; padding: 36px 56px 80px; }
@media (max-width: 900px) { .display { padding: 24px 24px 60px; } }

/* Header */
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0; }
.logo-word { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; }
.live-badge { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 3px; color: var(--accent2); margin-top: 6px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: blink 1s infinite alternate; }
@keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
.current-time { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 4px; text-shadow: 0 0 30px rgba(0,229,255,0.4); }
.current-date { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
.xfade-indicator { font-size: 10px; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; animation: blink 0.5s infinite; display: none; margin-top: 4px; }
.xfade-indicator.visible { display: block; }
.listener-info { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
.theme-toggle {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px;
  padding: 3px 8px; cursor: pointer; border-radius: var(--radius-sm);
  transition: all var(--transition); white-space: nowrap;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

/* Audio button */
.audio-btn {
  display: none; margin-top: 8px;
  background: rgba(0,229,255,0.1); border: 1px solid var(--accent);
  color: var(--accent); font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 2px; padding: 6px 14px;
  cursor: pointer; border-radius: 2px;
}
.audio-btn.visible { display: block; }
.audio-btn.playing { background: rgba(0,255,136,0.1); border-color: var(--green); color: var(--green); }

/* Album art */
.art-area {
  position: fixed; right: 56px; top: 50%; transform: translateY(-50%);
  width: min(280px, 22vw); aspect-ratio: 1;
  z-index: 0;
}
.art-circle {
  width: 100%; height: 100%; border-radius: 50%;
  border: 1px solid rgba(0,229,255,0.2);
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0,229,255,0.1);
  animation: spin 30s linear infinite;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.art-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 50%; overflow: hidden; }
#art-img { width: 100%; height: 100%; object-fit: cover; display: none; position: relative; z-index: 1; }
/* Vinyl label effect: small circle hint in center */
#art-img[style*="block"] ~ .vinyl-label { display: block; }
.vinyl-label { display: none; position: absolute; width: 30%; height: 30%; border-radius: 50%; background: var(--bg); border: 2px solid rgba(255,255,255,0.06); top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; pointer-events: none; }
.vinyl-label::after { content: ''; position: absolute; width: 28%; height: 28%; border-radius: 50%; background: var(--surface); top: 50%; left: 50%; transform: translate(-50%,-50%); }
.no-art-rings { position: absolute; inset: 0; }
.ring { position: absolute; border: 1px solid rgba(0,229,255,0.08); border-radius: 50%; }

/* Main content */
.now-playing-block { flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 65%; }
.np-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.np-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

.genre-badge { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent3);
  background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3);
  padding: 4px 14px; border-radius: 20px; display: inline-block; margin-bottom: 16px; transition: all 0.5s; }

.big-title { font-family: 'Syncopate', sans-serif; font-size: clamp(28px, 4.5vw, 68px); font-weight: 700;
  color: var(--bright); line-height: 1.1; margin-bottom: 10px; letter-spacing: 1px;
  text-shadow: 0 0 60px rgba(0,0,0,0.15); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.big-artist { font-size: clamp(16px, 2.2vw, 32px); color: var(--accent); font-weight: 300;
  letter-spacing: 4px; margin-bottom: 8px; text-shadow: 0 0 30px var(--glow-g); }
.big-album { font-size: clamp(12px, 1.2vw, 18px); color: var(--muted); letter-spacing: 2px; margin-bottom: 28px; font-style: italic; }

/* Progress */
.mega-progress { position: relative; margin-bottom: 12px; }
.mega-progress-bg { height: 6px; background: var(--border); border-radius: var(--radius-sm); overflow: visible; position: relative; }
.mega-progress-fill { height: 100%; border-radius: var(--radius-sm); background: linear-gradient(90deg,var(--accent2),var(--accent));
  box-shadow: 0 0 20px var(--glow-g); transition: width 0.5s linear; }
.fade-zone { position: absolute; top: -5px; height: 16px; background: rgba(255,204,0,0.2);
  border-left: 2px solid var(--yellow); border-radius: 2px; pointer-events: none; display: none; }
.progress-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: 1px; }
.time-left { color: var(--accent); font-size: 14px; font-family: 'Orbitron', sans-serif; }

/* Next up */
.next-up-block { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 14px 20px; display: flex; align-items: center; gap: 16px; margin-top: 24px; }
.next-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.next-title { font-size: 15px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.next-artist { font-size: 11px; color: var(--muted); }
.next-divider { width: 1px; height: 30px; background: var(--border); flex-shrink: 0; }
.next-art { width: 36px; height: 36px; border-radius: 3px; object-fit: cover; flex-shrink: 0; display: none; }

/* Marquee */
.marquee-bar { position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to right, rgba(0,229,255,0.08), rgba(255,51,102,0.08));
  border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 0; overflow: hidden; z-index: 10; height: 38px; }
.marquee-track { display: flex; gap: 80px; animation: marquee 40s linear infinite; white-space: nowrap; will-change: transform; transform: translateZ(0); }
.marquee-track:hover { animation-play-state: paused; }
@keyframes marquee { from { transform: translate3d(0,0,0); } to { transform: translate3d(-50%,0,0); } }
.marquee-msg { font-size: 12px; color: var(--text); letter-spacing: 1px; flex-shrink: 0; }
.marquee-msg span { color: var(--accent); margin-right: 4px; }

/* Side viz */
.side-viz { position: fixed; bottom: 38px; display: flex; align-items: flex-end; gap: 2px; height: 44px; }
.side-viz.left { left: 20px; }
.side-viz.right { right: 20px; }
.side-viz-bar { width: 3px; border-radius: 2px; background: var(--accent); opacity: 0.4; min-height: 2px; transition: height 0.09s ease; }

/* Synced lyrics */
#lyrics-content .lrc-line { transition: color 0.2s, opacity 0.2s; opacity: 0.55; }
#lyrics-content .lrc-line.active { color: var(--green); opacity: 1; text-shadow: 0 0 12px rgba(0,255,136,0.35); }

/* ─── Tablet ─────────────────────────────── */
@media (max-width: 1100px) {
  .art-area { width: min(180px, 18vw); right: 24px; }
}
/* ─── Mobile Responsive ────────────────────────── */
@media (max-width: 768px) {
  .display { padding: 16px 20px 60px; }
  .now-playing-block { max-width: 100%; }
  .big-title { font-size: clamp(20px, 6vw, 32px); white-space: normal; }
  .big-artist { font-size: clamp(14px, 3vw, 20px); }
  .big-album { font-size: clamp(11px, 2vw, 14px); }
  .art-area { position: relative; right: auto; top: auto; transform: none; width: 120px; margin: 0 auto 16px; }
  .header { flex-direction: column; align-items: center; text-align: center; }
  .current-time { font-size: 18px; }
  .next-up-block { flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .next-title { font-size: 12px; }
  .side-viz { display: none; }
  .mega-progress-bg { height: 4px; }
  .time-left { font-size: 11px; }
  #lyrics-panel { max-height: 180px; }
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
</div>

<!-- Album art (fixed right) -->
<div class="art-area">
  <div class="art-circle" id="art-circle">
    <div class="art-inner">
      <img id="art-img" alt="Album Art">
      <div class="vinyl-label"></div>
      <div class="no-art-rings" id="no-art-rings">
        <div class="ring" style="inset:8%"></div>
        <div class="ring" style="inset:22%"></div>
        <div class="ring" style="inset:38%"></div>
      </div>
    </div>
  </div>
</div>

<div class="display">
  <div class="header">
    <div>
      <div class="logo-word">AutoDJ</div>
      <div class="live-badge"><div class="live-dot"></div> LIVE MIX</div>
    </div>
    <div style="text-align:right">
      <div class="current-time" id="clock">00:00:00</div>
      <div class="current-date" id="date-display"></div>
      <div class="listener-info" id="listener-info"></div>
      <div class="xfade-indicator" id="xfade-ind">⇄ CROSSFADING</div>
      <!-- Audio listen button — requires user gesture to unlock -->
      <button class="audio-btn visible" id="audio-listen-btn" onclick="toggleAudio()">🔇 Enable Audio</button>
      <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:4px">
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">LIGHT</button>
        <button style="background:none;border:1px solid var(--border);color:var(--muted);font-size:9px;padding:3px 8px;border-radius:var(--radius-sm);cursor:pointer" onclick="fetch('/api/nowplaying/clear',{method:'POST'}).catch(()=>{})">Clear</button>
      </div>
    </div>
  </div>

  <div class="now-playing-block">
    <div class="np-label">Now Playing</div>
    <div class="genre-badge" id="genre-display">— Waiting —</div>
    <div class="big-title" id="np-title">AutoDJ</div>
    <div class="big-artist" id="np-artist">Open DJ Console to start</div>
    <div class="big-album" id="np-album"></div>

    <div class="mega-progress">
      <div class="mega-progress-bg">
        <div class="mega-progress-fill" id="np-progress" style="width:0%"></div>
        <div class="fade-zone" id="fade-zone"></div>
      </div>
    </div>
    <div class="progress-times">
      <span id="np-elapsed">0:00</span>
      <span class="time-left" id="np-remaining">—</span>
      <span id="np-duration">0:00</span>
    </div>

    <div class="next-up-block">
      <div class="next-label">Next Up</div>
      <div class="next-divider"></div>
      <img class="next-art" id="next-art" alt="">
      <div style="overflow:hidden;flex:1">
        <div class="next-title" id="np-next-title">—</div>
        <div class="next-artist" id="np-next-artist">—</div>
      </div>
    </div>

    <div id="deck-cues" style="display:none;margin-top:20px;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:6px">
      <div style="font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:10px;text-transform:uppercase">Deck cues</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:11px">
        <div id="cue-deck-a" style="padding:8px;border-radius:4px;border:1px solid rgba(0,229,255,0.15)">
          <div style="color:var(--accent);font-size:9px;letter-spacing:2px;margin-bottom:4px">DECK A</div>
          <div id="cue-a-title" style="color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</div>
          <div id="cue-a-artist" style="color:var(--muted);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</div>
          <div style="margin-top:6px;color:var(--muted);font-family:'Orbitron',sans-serif;font-size:10px"><span id="cue-a-elapsed">0:00</span> / <span id="cue-a-dur">0:00</span></div>
        </div>
        <div id="cue-deck-b" style="padding:8px;border-radius:4px;border:1px solid rgba(255,51,102,0.15)">
          <div style="color:var(--accent2);font-size:9px;letter-spacing:2px;margin-bottom:4px">DECK B</div>
          <div id="cue-b-title" style="color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</div>
          <div id="cue-b-artist" style="color:var(--muted);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</div>
          <div style="margin-top:6px;color:var(--muted);font-family:'Orbitron',sans-serif;font-size:10px"><span id="cue-b-elapsed">0:00</span> / <span id="cue-b-dur">0:00</span></div>
        </div>
      </div>
    </div>

    <!-- Lyrics (LRCLIB) -->
    <div id="lyrics-panel" style="display:none;margin-top:10px;padding:10px 16px;background:rgba(0,229,255,0.03);border:1px solid rgba(0,229,255,0.08);border-radius:6px;max-height:280px;overflow-y:auto;text-align:center;position:relative;z-index:20">
      <div id="lyrics-content" style="font-size:12px;line-height:1.8;color:#8899bb;white-space:normal"></div>
      <div id="lyrics-source" style="font-size:8px;color:#445;margin-top:4px;letter-spacing:1px;text-transform:uppercase"></div>
    </div>
  </div>
</div>

<!-- Side visualizers -->
<div class="side-viz left" id="viz-left">
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
</div>
<div class="side-viz right" id="viz-right">
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
  <div class="side-viz-bar"></div><div class="side-viz-bar"></div>
</div>

<!-- Marquee -->
<div class="marquee-bar">
  <div class="marquee-track" id="marquee-track"></div>
</div>

<!-- Audio relay: second decode of the same stream URL as the DJ page (separate audio element, not the DJ tab DOM) -->
<audio id="relay-audio" preload="metadata" crossorigin="anonymous"></audio>

<script>
// ─── Theme ────────────────────────────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('autodj-theme');
  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  const theme = saved || (prefersLight ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  const btn = document.getElementById('themeToggle');
  if (btn) {
    btn.textContent = theme === 'light' ? 'DARK' : 'LIGHT';
    btn.addEventListener('click', function(){
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('autodj-theme', next);
      btn.textContent = next === 'light' ? 'DARK' : 'LIGHT';
    });
  }
})();
// ─── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('date-display').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
setInterval(updateClock, 1000); updateClock();

// ─── State ────────────────────────────────────────────────────────────────────
let state = { nowPlaying: null, nextUp: null, primaryDeck: 'a', decks: { a: null, b: null }, genre: '', messages: [], isPlaying: false, isFading: false, config: {} };
// Client-side elapsed interpolation
let baseElapsed = 0;       // elapsed at last SSE update
let baseTime = 0;          // Date.now() at last SSE update
let currentTrackId = '';   // detect track changes
let deckCueTime = 0;       // last time deck cues were updated (for drift)

// ─── Audio Relay ──────────────────────────────────────────────────────────────
// The display page relays audio from the server stream so the room can hear it
// without needing to open the DJ console.
const relayAudio = document.getElementById('relay-audio');
let audioEnabled = false;
let currentStreamUrl = '';
let relayNeedsSeek = true;
const RELAY_SEEK_DRIFT_SEC = 1.6;

function seekRelayToBaseline() {
  try {
    const np = state.nowPlaying;
    if (!np || !relayAudio.duration || !Number.isFinite(relayAudio.duration)) return;
    const sinceUpdate = (Date.now() - baseTime) / 1000;
    let t = Math.min(Math.max(0, baseElapsed + sinceUpdate), (np.duration || relayAudio.duration) - 0.15);
    if (relayAudio.seekable && relayAudio.seekable.length) {
      const end = relayAudio.seekable.end(relayAudio.seekable.length - 1);
      t = Math.min(t, Math.max(0, end - 0.08));
    }
    const cur = relayAudio.currentTime || 0;
    if (Math.abs(cur - t) < 0.35 && !relayNeedsSeek) return;
    relayAudio.currentTime = t;
  } catch (e) { console.warn('[AutoDJ][relay] seek', e); }
}

relayAudio.addEventListener('ended', () => {
  // Only advance if we're actually near the end of the song (85%+)
  // Otherwise the stream likely failed mid-track — don't skip ahead
  const np = state.nowPlaying;
  if (np && np.duration > 0) {
    const sinceUpdate = (Date.now() - baseTime) / 1000;
    const interpolatedElapsed = baseElapsed + sinceUpdate;
    if (interpolatedElapsed < np.duration * 0.85) {
      console.warn('[AutoDJ][relay] ended event at ' + fmt(interpolatedElapsed) + ' — stream failed mid-track, re-seeking');
      relayNeedsSeek = true;
      seekRelayToBaseline();
      if (state.isPlaying) relayAudio.play().catch(() => {});
      return;
    }
  }
  fetch('/api/playback/event', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'ended' }) }).catch(() => {});
});
relayAudio.addEventListener('error', () => {
  console.warn('[AutoDJ][relay] stream error — will retry');
  // Trigger a seek reload to try again
  if (state.isPlaying && currentStreamUrl) {
    setTimeout(() => {
      relayAudio.load();
      relayAudio.play().catch(() => {});
    }, 2000);
  }
});
relayAudio.addEventListener('loadedmetadata', () => {
  if (audioEnabled && state.isPlaying) seekRelayToBaseline();
});
relayAudio.addEventListener('canplay', () => {
  if (audioEnabled && relayNeedsSeek && state.isPlaying) {
    relayNeedsSeek = false;
    seekRelayToBaseline();
    relayAudio.play().catch(() => {});
  }
});

function toggleAudio() {
  const btn = document.getElementById('audio-listen-btn');
  if (!audioEnabled) {
    audioEnabled = true;
    btn.textContent = '🔊 Audio On';
    if (currentStreamUrl) {
      relayAudio.src = currentStreamUrl;
      relayAudio.load();
      if (state.isPlaying) {
        btn.classList.add('playing');
        relayAudio.play().catch(e => console.warn('Audio relay:', e));
      } else {
        btn.classList.remove('playing');
      }
    }
  } else {
    audioEnabled = false;
    btn.textContent = '🔇 Enable Audio';
    btn.classList.remove('playing');
    relayAudio.pause();
    relayNeedsSeek = true;
  }
}

function setRelayStream(url, shouldPlay) {
  if (!url || url === currentStreamUrl) return;
  currentStreamUrl = url;
  relayNeedsSeek = true;
  if (audioEnabled) {
    relayAudio.src = url;
    relayAudio.load();
    if (shouldPlay !== false) relayAudio.play().catch(() => {});
  }
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/nowplaying/stream');
  es.onmessage = e => applyState(JSON.parse(e.data));
  es.onerror = () => setTimeout(connectSSE, 3000);
}
connectSSE();

function applyState(data) {
  const prevTrackId = currentTrackId;
  state = { ...state, ...data };

  // Handle playback commands (server auto-advance)
  if (data.command === 'play') {
    const url = data.url || (data.nowPlaying?.youtubeId ? `/api/cache/stream/${encodeURIComponent(data.nowPlaying.youtubeId)}` : '');
    if (url) {
      if (!audioEnabled) {
        audioEnabled = true;
        const btn = document.getElementById('audio-listen-btn');
        if (btn) { btn.textContent = '🔊 Audio On'; btn.classList.add('playing'); }
      }
      currentStreamUrl = url;
      setRelayStream(url, true);
    }
  } else if (data.command === 'stop') {
    relayAudio.pause();
    relayAudio.src = '';
    const btn = document.getElementById('audio-listen-btn');
    if (btn) btn.classList.remove('playing');
    audioEnabled = false;
  } else if (!data.command && data.sessionActive && data.nowPlaying && data.nowPlaying.youtubeId && !relayAudio.src) {
    // Initial load when server has active session — auto-start audio
    if (!audioEnabled) {
      audioEnabled = true;
      const btn = document.getElementById('audio-listen-btn');
      if (btn) { btn.textContent = '🔊 Audio On'; if (data.isPlaying) btn.classList.add('playing'); }
    }
    const url = `/api/cache/stream/${encodeURIComponent(data.nowPlaying.youtubeId)}`;
    currentStreamUrl = url;
    setRelayStream(url, data.isPlaying);
  }

  // Derive nowPlaying from audible deck if null but deck data exists
  let np = state.nowPlaying;
  if (!np && state.decks) {
    const audibleDeck = state.primaryDeck || 'a';
    const d = state.decks[audibleDeck];
    if (d && d.title && d.title !== '—') {
      np = {
        title: d.title, artist: d.artist || '', album: d.album || '',
        duration: d.duration || 0, elapsed: d.elapsed || 0,
        artwork: d.artwork || '', youtubeId: d.youtubeId || null,
        streamUrl: d.streamUrl || '', fadePoint: d.fadePoint || null,
        tags: d.tags || []
      };
      state.nowPlaying = np;
    }
  }

  // Detect track change — reset interpolation baseline
  const trackId = np ? `${np.youtubeId || ''}::${np.title}::${np.artist}` : '';
  if (trackId !== prevTrackId) {
    currentTrackId = trackId;
    baseElapsed = np?.elapsed || 0;
    baseTime = Date.now();

    // Update audio relay stream when track changes
    if (np?.streamUrl) setRelayStream(np.streamUrl, state.isPlaying);
    relayNeedsSeek = true;
  } else if (np && np.elapsed !== undefined) {
    baseElapsed = np.elapsed;
    baseTime = Date.now();
    if (audioEnabled && relayAudio.src && state.isPlaying) {
      const cap = (np.duration && Number.isFinite(np.duration)) ? np.duration : (relayAudio.duration && Number.isFinite(relayAudio.duration) ? relayAudio.duration : null);
      let target = np.elapsed;
      if (cap) target = Math.min(target, cap - 0.12);
      const drift = Math.abs((relayAudio.currentTime || 0) - target);
      if (drift > RELAY_SEEK_DRIFT_SEC) {
        relayNeedsSeek = true;
        seekRelayToBaseline();
      }
    }
  }

  deckCueTime = Date.now();

  if (typeof data.isPlaying === 'boolean') {
    if (!data.isPlaying) {
      relayAudio.pause();
      document.getElementById('audio-listen-btn')?.classList.remove('playing');
    } else if (audioEnabled && relayAudio.src) {
      document.getElementById('audio-listen-btn')?.classList.add('playing');
      if (relayAudio.paused) relayAudio.play().catch(() => {});
    }
  }

  if (np) {
    setText('np-title', np.title || '—');
    setText('np-artist', np.artist || '—');
    setText('np-album', np.album || '');
    // Update listener count from SSE
    if (data.listenerCount !== undefined) {
      document.getElementById('listener-info').textContent = `${data.listenerCount} listener${data.listenerCount === 1 ? '' : 's'}`;
    }
    fetchLyrics(np.artist, np.title, np.duration, np.youtubeId);

    // Artist background (subtle gradient from artwork)
    const bgEl = document.querySelector('.bg-art-fade') || (() => {
      const el = document.createElement('div');
      el.className = 'bg-art-fade';
      el.style.cssText = 'position:fixed;inset:0;z-index:0;transition:background 1s ease;pointer-events:none';
      document.querySelector('.bg-orbs')?.after(el);
      return el;
    })();
    if (np.artwork && np.artwork !== 'undefined') {
      bgEl.style.background = `radial-gradient(ellipse at center, rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url(${np.artwork}) center/cover`;
    } else {
      bgEl.style.background = '';
    }

    // Artwork
    const artImg = document.getElementById('art-img');
    const noArt = document.getElementById('no-art-rings');
    if (np.artwork && np.artwork !== 'undefined') {
      artImg.src = np.artwork;
      artImg.style.display = 'block';
      if (noArt) noArt.style.display = 'none';
    } else {
      artImg.style.display = 'none';
      if (noArt) noArt.style.display = 'block';
    }
  }

  if (data.nextUp) {
    setText('np-next-title', data.nextUp.title || '—');
    setText('np-next-artist', data.nextUp.artist || '—');
    const nextArt = document.getElementById('next-art');
    if (data.nextUp.artwork) { nextArt.src = data.nextUp.artwork; nextArt.style.display = 'block'; }
    else nextArt.style.display = 'none';
  } else {
    setText('np-next-title', '—'); setText('np-next-artist', '—');
    document.getElementById('next-art').style.display = 'none';
  }

  if (data.genre) setText('genre-display', data.genre);
  if (data.messages?.length) buildMarquee(data.messages);
  if (data.config) { state.config = data.config; fetchRssItems(); }
  document.getElementById('xfade-ind').classList.toggle('visible', !!data.isFading);

  const deckPanel = document.getElementById('deck-cues');
  if (data.decks && (data.decks.a?.title || data.decks.b?.title)) {
    if (deckPanel) deckPanel.style.display = 'block';
    ['a', 'b'].forEach(letter => {
      const d = data.decks[letter];
      if (!d) return;
      setText(`cue-${letter}-title`, d.title || '—');
      setText(`cue-${letter}-artist`, d.artist || '—');
      setText(`cue-${letter}-elapsed`, fmt(d.elapsed || 0));
      setText(`cue-${letter}-dur`, fmt(d.duration || 0));
      const el = document.getElementById(`cue-deck-${letter}`);
      if (el) el.style.opacity = d.isAudible ? '1' : '0.62';
    });
  } else if (deckPanel) deckPanel.style.display = 'none';
}

// ─── Progress interpolation (smooth, no restart) ──────────────────────────────
function updateProgress() {
  const np = state.nowPlaying;
  if (!np) return;

  const sinceUpdate = (Date.now() - baseTime) / 1000;
  const elapsed = Math.min(baseElapsed + sinceUpdate, np.duration || 9999);
  const dur = np.duration || 0;
  if (dur <= 0) return;

  const pct = (elapsed / dur) * 100;
  const remain = dur - elapsed;

  setStyle('np-progress', 'width', Math.min(pct, 100) + '%');
  setText('np-elapsed', fmt(elapsed));
  setText('np-remaining', remain > 0 ? '-' + fmt(remain) : '0:00');
  setText('np-duration', fmt(dur));

  if (state.isPlaying) updateLrcHighlight(elapsed);

  // Fade zone
  const fp = np.fadePoint;
  const fz = document.getElementById('fade-zone');
  if (fp && fp < dur) {
    fz.style.display = 'block';
    fz.style.left = ((fp / dur) * 100) + '%';
    fz.style.width = (((dur - fp) / dur) * 100) + '%';
  } else {
    fz.style.display = 'none';
  }

  // Deck cue rows — light drift sync between SSE ticks
  if (state.decks) {
    const drift = (Date.now() - deckCueTime) / 1000;
    ['a', 'b'].forEach(letter => {
      const d = state.decks[letter];
      if (!d || !d.title) return;
      const elap = Math.min((d.elapsed || 0) + drift, (d.duration || 99999) - 0.05);
      setText(`cue-${letter}-elapsed`, fmt(Math.max(0, elap)));
    });
  }
}

setInterval(updateProgress, 300);

// ─── Marquee ──────────────────────────────────────────────────────────────────
let builtMessages = [];
let rssItems = [];
let rssFetchTimer = 0;
async function fetchRssItems() {
  const now = Date.now();
  if (now - rssFetchTimer < 120000) return; // throttle: max once per 2 min
  rssFetchTimer = now;
  try {
    const cfg = state.config || {};
    const url = cfg.rssFeedUrl || '';
    if (!url) { rssItems = []; return; }
    const r = await fetch(`/api/rss?url=${encodeURIComponent(url)}`);
    const d = await r.json();
    rssItems = (d.items || []).map(i => i.title);
  } catch (e) { rssItems = []; }
}
function buildMarquee(messages) {
  const cfg = state.config || {};
  const mode = cfg.marqueeMode || 'rss';
  let combined = [];
  if (mode === 'rss' || mode === 'both') {
    if (rssItems.length) {
      const picks = [...rssItems].sort(() => Math.random() - 0.5).slice(0, 5);
      combined.push(...picks);
    }
  }
  if (mode === 'messages' || mode === 'both') {
    combined.push(...messages);
  }
  if (!combined.length) {
    combined = ['🎵 AutoDJ warming up...', '🔊 Open DJ Console to begin', '🎧 Connect speakers and press play'];
  }
  if (JSON.stringify(combined) === JSON.stringify(builtMessages)) return;
  builtMessages = combined;
  const track = document.getElementById('marquee-track');
  const all = [...combined, ...combined]; // duplicate for seamless loop
  track.innerHTML = all.map(m => `<div class="marquee-msg"><span>◆</span>${m}</div>`).join('');
  track.style.animationDuration = Math.max(30, Math.max(combined.length, 1) * 5) + 's';
}
buildMarquee(['🎵 AutoDJ warming up...', '🔊 Open DJ Console to begin', '🎧 Connect speakers and press play']);
// Refresh RSS and rebuild every 5 minutes
setInterval(async () => { await fetchRssItems(); buildMarquee(state.messages || []); }, 300000);

// ─── Visualizer ───────────────────────────────────────────────────────────────
function animateViz() {
  const playing = state.isPlaying;
  ['viz-left','viz-right'].forEach(id => {
    const bars = document.getElementById(id).children;
    for (const b of bars) {
      b.style.height = (playing ? Math.random()*36+4 : 2) + 'px';
      b.style.opacity = playing ? (0.3 + Math.random() * 0.5) : 0.1;
    }
  });
}
setInterval(animateViz, 90);

// ─── Art pulse on track change ────────────────────────────────────────────────
let lastTitle = '';
setInterval(() => {
  const title = state.nowPlaying?.title || '';
  if (title !== lastTitle) {
    lastTitle = title;
    const c = document.getElementById('art-circle');
    c.style.boxShadow = '0 0 120px rgba(0,229,255,0.35)';
    setTimeout(() => c.style.boxShadow = '0 0 80px rgba(0,229,255,0.1)', 1000);
  }
}, 1000);

// ─── Fallback poll ────────────────────────────────────────────────────────────
setInterval(async () => {
  try { applyState(await (await fetch('/api/nowplaying')).json()); } catch(e) {}
  try {
    const lr = await (await fetch('/api/listeners')).json();
    document.getElementById('listener-info').textContent = `${lr.count} listener${lr.count === 1 ? '' : 's'}`;
  } catch(e) {}
}, 8000);

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s) || s < 0) return '0:00';
  const sec = Math.round(s);
  if (sec <= 0) return '0:00';
  const m = Math.floor(sec / 60);
  const secs = sec % 60;
  if (m >= 60) return `${Math.floor(m/60)}:${(m%60).toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  return `${m}:${secs.toString().padStart(2,'0')}`;
}
function setText(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }

// ─── Lyrics (LRCLIB) ─────────────────────────────────────────────────────
let currentLyricsKey = '';
function escapeHtml(s) {
  const e = document.createElement('span');
  e.textContent = s == null ? '' : String(s);
  return e.innerHTML;
}
/** Parse LRC [mm:ss.xx] lines into { t, text }[] */
function parseLrcLines(syncedText) {
  const out = [];
  for (const line of String(syncedText).split(/\r?\n/)) {
    const tags = [...line.matchAll(/\[(\d+):(\d{2})(?:\.(\d{1,3}))?\]/g)];
    if (!tags.length) continue;
    const text = line.replace(/\[\d+:\d{2}(?:\.\d+)?\]/g, '').trim();
    if (!text) continue;
    for (const m of tags) {
      const mm = parseInt(m[1], 10), ss = parseInt(m[2], 10);
      const frac = m[3] != null ? parseInt(String(m[3]).padEnd(3, '0').slice(0, 3), 10) / 1000 : 0;
      out.push({ t: mm * 60 + ss + frac, text });
    }
  }
  out.sort((a, b) => a.t - b.t);
  return out;
}
function updateLrcHighlight(elapsed) {
  // Use relayAudio currentTime for best sync when available
  const syncTime = (audioEnabled && relayAudio && relayAudio.readyState >= 2 && !isNaN(relayAudio.currentTime))
    ? relayAudio.currentTime : elapsed;
  const lines = document.querySelectorAll('#lyrics-content .lrc-line');
  if (!lines.length) return;
  let active = -1;
  let nextT = Infinity;
  for (let i = 0; i < lines.length; i++) {
    const t0 = parseFloat(lines[i].dataset.t);
    const t1 = i + 1 < lines.length ? parseFloat(lines[i + 1].dataset.t) : Infinity;
    if (syncTime >= t0 - 0.3 && syncTime < t1) { active = i; nextT = t1; break; }
  }
  lines.forEach((el, i) => {
    if (i === active) {
      el.classList.add('active');
      // Interpolate opacity: fade to next line as we approach it
      if (nextT < Infinity && nextT > 0) {
        const pct = Math.min(1, Math.max(0, (elapsed - parseFloat(el.dataset.t)) / (nextT - parseFloat(el.dataset.t))));
        el.style.opacity = (1 - pct * 0.45).toFixed(2);
      } else {
        el.style.opacity = '1';
      }
    } else {
      el.classList.remove('active');
      el.style.opacity = '';
    }
  });
  // Auto-scroll to active line (panel-relative, no page scroll stealing)
  if (active >= 0 && lines[active]) {
    const panel = document.getElementById('lyrics-panel');
    if (panel) {
      const panelRect = panel.getBoundingClientRect();
      const lineRect = lines[active].getBoundingClientRect();
      const lineH = lines[active].offsetHeight || 24;
      const relTop = lineRect.top - panelRect.top + panel.scrollTop;
      const centerTarget = relTop - (panel.clientHeight / 2) + (lineH / 2);
      if (Math.abs(panel.scrollTop - centerTarget) > lineH) {
        panel.scrollTop = Math.max(0, centerTarget);
      }
    }
  }
}
async function fetchLyrics(artist, title, duration, youtubeId) {
  const key = `${youtubeId || ''}::${artist}::${title}`;
  if (key === currentLyricsKey || !artist || !title || artist === '—') return;
  currentLyricsKey = key;
  const panel = document.getElementById('lyrics-panel');
  const content = document.getElementById('lyrics-content');
  const src = document.getElementById('lyrics-source');
  try {
    let url = `/api/lyrics?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`;
    let d = duration ? Math.round(parseFloat(duration)) : 0;
      if (d > 1e11) d = Math.round(d / 1000);
    if (d < 10) d = 0;
    if (d) url += `&duration=${d}`;
    const r = await fetch(url);
    const data = await r.json();
    if (data.synced || data.plain) {
      if (panel) panel.style.display = 'block';
      if (content) {
        if (data.synced) {
          const rows = parseLrcLines(data.synced);
          if (rows.length) {
            content.innerHTML = rows.map(l => `<div class="lrc-line" data-t="${l.t}">${escapeHtml(l.text)}</div>`).join('');
          } else {
            content.textContent = data.synced.replace(/\[\d+:\d{2}(?:\.\d+)?\]\s*/g, '');
          }
        } else {
          content.textContent = data.plain;
        }
      }
      if (src) src.textContent = `♪ lyrics via ${data.source || 'lrclib'}`;
    } else {
      if (panel) panel.style.display = 'none';
    }
  } catch(e) { if (panel) panel.style.display = 'none'; }
}
function setStyle(id, prop, val) { const e = document.getElementById(id); if (e) e.style[prop] = val; }

// ─── WebRTC Receive ──────────────────────────────────────────────────────────
let _webrtcState = null;
async function tryConnectWebRTC() {
  if (_webrtcState) return;
  const audioEl = document.getElementById('webrtc-audio') || (() => {
    const el = document.createElement('audio');
    el.id = 'webrtc-audio';
    el.autoplay = true;
    el.style.display = 'none';
    document.body.appendChild(el);
    return el;
  })();
  try {
    const r = await fetch('/api/webrtc/offer');
    const offer = await r.json();
    if (!offer || !offer.sdp) return;
    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    _webrtcState = { pc };
    let stream = null;
    pc.ontrack = (e) => {
      stream = e.streams[0];
      if (stream && audioEl) {
        audioEl.srcObject = stream;
        audioEl.play().catch(() => {});
      }
    };
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await fetch('/api/webrtc/answer', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type })
    });
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        fetch('/api/webrtc/ice', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ candidate: e.candidate.candidate, sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex })
        }).catch(() => {});
      }
    };
  } catch (e) { /* no broadcast available */ }
}
// Attempt WebRTC connection on page load
setTimeout(tryConnectWebRTC, 1000);
